url: https://rladies.github.io/jinx/

template:
  package: cloak
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]

reference:
  - title: Commands
    desc: Issue comment command interface
    contents:
      - starts_with("command_")

  - title: Team management
    desc: Global team onboarding and offboarding
    contents:
      - starts_with("global_team_")

  - title: Announcements
    desc: Cross-platform blog post announcements
    contents:
      - announce_post
      - create_announcement_message
      - post_bluesky
      - post_mastodon
      - li_post_write
      - li_req
      - li_oauth
      - li_urn_me
      - li_media_upload
      - li_get_version
      - send_newsletter
      - short_url
      - tags2hash
      - random_emoji

  - title: Directory
    desc: Directory entry management and validation
    contents:
      - validate_directory_pr
      - validate_directory_entries
      - validate_entry_filename
      - verify_social_handles
      - crop_directory_image
      - optimize_image

  - title: Blogs
    desc: Blog content management
    contents:
      - starts_with("blog_")
      - contains("blog_entry")

  - title: Chapters
    desc: Chapter lifecycle management
    contents:
      - create_chapter
      - chapter_create_setup
      - chapter_create_update
      - create_chapter_json_pr
      - chapter_check_health

  - title: Reports
    desc: Activity and health reporting
    contents:
      - starts_with("report_")
      - chapter_report_health

  - title: PR review
    desc: Automated pull request review
    contents:
      - review_pr
      - check_pr_naming

  - title: Airtable sync
    desc: Airtable bidirectional sync
    contents:
      - sync_directory_airtable
      - sync_global_team_airtable

  - title: Website automation
    desc: Website PR management and contributor greetings
    contents:
      - contains("merge_pending")
      - greet_contributor

  - title: Chapter monitoring
    desc: Chapter activity monitoring and outreach
    contents:
      - monitor_chapter_status
      - prepare_inactivity_emails

  - title: Slack
    desc: Slack messaging and automation
    contents:
      - starts_with("slack_")
      - subscribe_slack_rss
      - common_welcome_channels
      - default_welcome_channels

  - title: GHA dashboard
    desc: GitHub Actions workflow status
    contents:
      - starts_with("gha_")

  - title: Contributors
    desc: Contributor tracking and recognition
    contents:
      - list_contributors
      - list_org_contributors
      - format_contributors
      - starts_with("contributors_")
      - starts_with("contributor_")

  - title: Events
    desc: Chapter event management
    contents:
      - starts_with("events_")

  - title: Analytics
    desc: Org-wide activity analytics
    contents:
      - collect_chapter_activity
      - collect_contributor_growth
      - compute_activity_trends
      - format_analytics_markdown
      - analytics_generate_dashboard
      - analytics_publish_dashboard

  - title: Website analytics
    desc: Plausible website performance reports
    contents:
      - collect_website_analytics
      - format_website_analytics
      - generate_website_report
      - publish_website_report

  - title: Conference coordination
    desc: CFP tracking and speaker recommendations
    contents:
      - starts_with("cfp_")
      - list_speaker_recommendations
      - generate_conference_report

  - title: Internationalization
    desc: Template translations
    contents:
      - translate_template
      - list_supported_languages
      - get_chapter_language
      - starts_with("i18n_")

  - title: Configuration
    desc: Config loading utilities
    contents:
      - starts_with("load_")

  - title: Templates
    desc: Response and template utilities
    contents:
      - post_reply
