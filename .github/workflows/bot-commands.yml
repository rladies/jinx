name: Bot · Commands

on:
  issue_comment:
    types: [created]
  repository_dispatch:
    types: [slack-command]

permissions:
  contents: read
  packages: read

jobs:
  handle:
    if: >-
      github.event_name == 'repository_dispatch' ||
      (
        startsWith(github.event.comment.body, '/jinx ') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/rladies/jinx-bot:latest

    steps:
      - name: Mask Slack metadata
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "::add-mask::${{ github.event.client_payload.team_id }}"
          echo "::add-mask::${{ github.event.client_payload.channel_id }}"
          echo "::add-mask::${{ github.event.client_payload.response_url }}"
          echo "::add-mask::${{ github.event.client_payload.user_name }}"
          echo "::add-mask::${{ github.event.client_payload.user_id }}"
          echo "::add-mask::${{ github.event.client_payload.command }}"

      - name: Verify Slack workspace
        if: github.event_name == 'repository_dispatch'
        env:
          TEAM_ID: ${{ github.event.client_payload.team_id }}
          ORGANIZER_TEAM_ID: ${{ vars.SLACK_ORGANIZER_TEAM_ID }}
          COMMUNITY_TEAM_ID: ${{ vars.SLACK_COMMUNITY_TEAM_ID }}
        run: |
          if [ -z "$ORGANIZER_TEAM_ID" ] && [ -z "$COMMUNITY_TEAM_ID" ]; then
            echo "::error::Neither SLACK_ORGANIZER_TEAM_ID nor SLACK_COMMUNITY_TEAM_ID set as org/repo vars"
            exit 1
          fi
          if [ "$TEAM_ID" != "$ORGANIZER_TEAM_ID" ] && [ "$TEAM_ID" != "$COMMUNITY_TEAM_ID" ]; then
            echo "::error::Slack team_id not in allowlist; refusing to run"
            exit 1
          fi

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Run command
        id: run
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          SLACK_INVITE_LINK: ${{ secrets.SLACK_INVITE_LINK }}
          SLACK_TOKEN: ${{ secrets.SLACK_ORGANISER_TOKEN }}
          COMMAND_SOURCE: ${{ github.event_name == 'repository_dispatch' && 'slack' || 'github' }}
          COMMAND_TEXT: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.command || github.event.comment.body }}
          COMMAND_ACTOR: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.user_id || github.event.comment.user.login }}
          COMMAND_TEAM_ID: ${{ github.event.client_payload.team_id }}
          SLACK_ORGANIZER_TEAM_ID: ${{ vars.SLACK_ORGANIZER_TEAM_ID }}
        run: |
          Rscript -e '
            source <- Sys.getenv("COMMAND_SOURCE")
            text <- Sys.getenv("COMMAND_TEXT")
            actor <- Sys.getenv("COMMAND_ACTOR")
            team_id <- Sys.getenv("COMMAND_TEAM_ID")
            organiser_id <- Sys.getenv("SLACK_ORGANIZER_TEAM_ID")
            workspace <- if (source != "slack") {
              "github"
            } else if (nzchar(organiser_id) && identical(team_id, organiser_id)) {
              "organiser"
            } else {
              "community"
            }
            if (source == "slack") text <- paste("/jinx", text)
            cmd <- jinx::cmd_parse(text)
            authz <- jinx::cmd_authorize(
              cmd, actor = actor, source = source, workspace = workspace
            )
            if (!isTRUE(authz$ok)) {
              result <- authz$message
            } else {
              result <- jinx::cmd_execute(cmd)
            }
            if (is.null(result)) result <- "\u2705 Done!"
            writeLines(result, "jinx_response.txt")
          '

      - name: Reply to GitHub issue
        if: always() && github.event_name == 'issue_comment'
        uses: actions/github-script@v9
        env:
          RUN_URL: https://github.com/rladies/jinx/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require("fs");
            const body = fs.existsSync("jinx_response.txt")
              ? fs.readFileSync("jinx_response.txt", "utf8")
              : `😿 Something went wrong. [View logs](${process.env.RUN_URL})`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });

      - name: Reply to Slack
        if: always() && github.event_name == 'repository_dispatch'
        env:
          SLACK_RESPONSE_URL: ${{ github.event.client_payload.response_url }}
          RUN_URL: https://github.com/rladies/jinx/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_RESPONSE_URL" ]; then
            echo "::warning::No response_url in payload; skipping Slack reply"
            exit 0
          fi
          if [ -f jinx_response.txt ]; then
            MSG=$(jq -Rs . < jinx_response.txt)
          else
            MSG=$(printf '😿 Something went wrong. <%s|View logs>' "$RUN_URL" | jq -Rs .)
          fi
          curl -sS -X POST "$SLACK_RESPONSE_URL" \
            -H "Content-Type: application/json" \
            -d "{\"response_type\":\"in_channel\",\"text\":${MSG}}"
