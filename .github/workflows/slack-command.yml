name: Slack Command

on:
  repository_dispatch:
    types: [slack-command]

jobs:
  handle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Handle command
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SLACK_TOKEN: ${{ secrets.SLACK_ORGANISER_TOKEN }}
          COMMAND: ${{ github.event.client_payload.command }}
          SLACK_USER: ${{ github.event.client_payload.user_name }}
          SLACK_CHANNEL: ${{ github.event.client_payload.channel_id }}
          SLACK_RESPONSE_URL: ${{ github.event.client_payload.response_url }}
          RUN_URL: https://github.com/rladies/jinx/actions/runs/${{ github.run_id }}
        run: |
          Rscript -e '
            response_url <- Sys.getenv("SLACK_RESPONSE_URL")

            reply <- function(msg) {
              # Try post_slack_message first, fall back to response_url
              tryCatch(
                jinx::post_slack_message(
                  text = msg,
                  channel = Sys.getenv("SLACK_CHANNEL")
                ),
                error = function(e) {
                  if (nzchar(response_url)) {
                    httr2::request(response_url) |>
                      httr2::req_body_json(list(
                        response_type = "ephemeral",
                        text = msg
                      )) |>
                      httr2::req_perform()
                  }
                }
              )
            }

            result <- tryCatch({
              command_text <- paste("/jinx", Sys.getenv("COMMAND"))
              cmd <- jinx::parse_command(command_text)
              ctx <- list(
                source = "slack",
                user = Sys.getenv("SLACK_USER"),
                channel = Sys.getenv("SLACK_CHANNEL"),
                response_url = response_url
              )
              jinx::execute_command(cmd, ctx)
              reply("\u2705 Done!")
            }, error = function(e) {
              run_url <- Sys.getenv("RUN_URL")
              reply(paste0(
                "\U0001f63f Oops! Something went wrong: ", e$message,
                "\n\n<", run_url, "|View logs>"
              ))
            })
          '
