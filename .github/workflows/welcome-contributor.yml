name: Welcome Contributors

on:
  workflow_call:
    secrets:
      JINX_APP_ID:
        required: true
      JINX_PRIVATE_KEY:
        required: true

jobs:
  welcome:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' && github.event.action == 'opened') ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies          owner: rladies


      - name: Checkout jinx
        uses: actions/checkout@v4
        with:
          repository: rladies/jinx

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Welcome contributor
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e '
            is_pr <- "${{ github.event_name }}" == "pull_request"
            number <- if (is_pr) {
              ${{ github.event.pull_request.number || 0 }}
            } else {
              ${{ github.event.issue.number || 0 }}
            }
            author <- if (is_pr) {
              "${{ github.event.pull_request.user.login }}"
            } else {
              "${{ github.event.issue.user.login }}"
            }
            jinx::welcome_contributor(
              owner = "${{ github.repository_owner }}",
              repo = "${{ github.event.repository.name }}",
              number = number,
              author = author,
              is_pr = is_pr
            )
          '
