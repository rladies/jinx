name: CI · i18n Validate

on:
  pull_request:
    paths:
      - "inst/translations/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Validate translation placeholders
        run: |
          Rscript -e '
            results <- jinx::i18n_translations_validate()
            mismatches <- results[results$status == "mismatch", ]
            missing <- results[results$status == "missing", ]
            if (nrow(missing) > 0) {
              cat("Missing translations (warning, tracked by i18n_coverage_check):\n")
              print(missing)
            }
            if (nrow(mismatches) > 0) {
              cat("Placeholder mismatches (fatal):\n")
              print(mismatches)
              quit(status = 1)
            }
            cat("All translation placeholders consistent.\n")
          '
