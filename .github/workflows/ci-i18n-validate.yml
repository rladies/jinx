name: CI · i18n Validate

on:
  pull_request:
    paths:
      - "inst/translations/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Validate translation placeholders
        run: |
          Rscript -e '
            results <- jinx::i18n_translations_validate()
            issues <- results[results$status != "ok", ]
            if (nrow(issues) > 0) {
              cat("Translation issues found:\n")
              print(issues)
              quit(status = 1)
            }
            cat("All translations valid.\n")
          '
