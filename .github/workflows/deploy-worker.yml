name: Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'wrangler.jsonc'
  pull_request:
    branches: [main]
    paths:
      - 'worker/**'
      - 'wrangler.jsonc'

jobs:
  validate:
    name: Validate worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate worker bundle
        run: npx wrangler deploy --dry-run --outdir /tmp/worker-dist

  deploy:
    name: Deploy worker
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
