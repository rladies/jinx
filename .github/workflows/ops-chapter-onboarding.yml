name: Ops · Chapter Onboarding

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        options:
          - setup
          - update
      city:
        description: Chapter city
        required: true
      country:
        description: Chapter country
        required: true

permissions:
  contents: read

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Checkout jinx
        uses: actions/checkout@v4
        with:
          repository: rladies/jinx

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Run chapter onboarding
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e '
            if ("${{ inputs.action }}" == "setup") {
              jinx::chapter_create_setup(
                city = "${{ inputs.city }}",
                country = "${{ inputs.country }}",
                organizers = character(0)
              )
            } else {
              jinx::chapter_create_update(
                city = "${{ inputs.city }}",
                country = "${{ inputs.country }}"
              )
            }
          '
