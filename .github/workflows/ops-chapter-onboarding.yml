name: Ops · Chapter Onboarding

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        options:
          - setup
          - update
      city:
        description: Chapter city
        required: true
      country:
        description: Chapter country
        required: true

concurrency:
  group: ops-chapter-onboarding-${{ inputs.city }}-${{ inputs.country }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  onboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Checkout jinx
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: rladies/jinx

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Run chapter onboarding
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          ACTION: ${{ inputs.action }}
          CITY: ${{ inputs.city }}
          COUNTRY: ${{ inputs.country }}
        run: |
          Rscript -e '
            action  <- Sys.getenv("ACTION")
            city    <- Sys.getenv("CITY")
            country <- Sys.getenv("COUNTRY")
            if (action == "setup") {
              jinx::chapter_create_setup(
                city = city,
                country = country,
                organizers = character(0)
              )
            } else {
              jinx::chapter_create_update(city = city, country = country)
            }
          '
