name: Ops · Global Team · 01 Invite

on:
  workflow_dispatch:
    inputs:
      team:
        type: choice
        description: Team
        required: true
        options:
          - abstract-review
          - blog
          - campaigns
          - chapter-activity
          - chapter-onboarding
          - coc
          - communications
          - community-slack
          - conference-liaison
          - directory
          - meetup-pro
          - mentoring
          - rocur
          - translation
          - website
      name:
        description: Full name
        required: true
      username:
        description: GitHub username (without @)
        required: true

concurrency:
  group: global-team-${{ inputs.username }}-${{ inputs.team }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  invite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Invite global team member
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e '
            jinx::gt_invite(
              username = "${{ inputs.username }}",
              team = "${{ inputs.team }}",
              name = "${{ inputs.name }}"
            )
          '

      - name: Save global team onboarding details
        run: |
          echo '{"username": "${{ inputs.username }}", "name": "${{ inputs.name }}", "team": "${{ inputs.team }}"}' > global-team-details.json

      - uses: actions/upload-artifact@v4
        with:
          name: global-team-${{ inputs.username }}-${{ inputs.team }}
          path: global-team-details.json
          retention-days: 7
