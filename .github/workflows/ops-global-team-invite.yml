name: Ops · Global Team · 01 Invite

on:
  workflow_dispatch:
    inputs:
      team:
        type: choice
        description: Team
        required: true
        options:
          - abstract-review
          - blog
          - campaigns
          - chapter-activity
          - chapter-onboarding
          - coc
          - communications
          - community-slack
          - conference-liaison
          - directory
          - meetup-pro
          - mentoring
          - rocur
          - translation
          - website
      name:
        description: Full name
        required: true
      username:
        description: GitHub username (without @)
        required: true

concurrency:
  group: global-team-${{ inputs.username }}-${{ inputs.team }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  invite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Invite global team member
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          USERNAME: ${{ inputs.username }}
          TEAM: ${{ inputs.team }}
          NAME: ${{ inputs.name }}
        run: |
          Rscript -e '
            jinx::gt_invite(
              username = Sys.getenv("USERNAME"),
              team     = Sys.getenv("TEAM"),
              name     = Sys.getenv("NAME")
            )
          '

      - name: Save global team onboarding details
        env:
          USERNAME: ${{ inputs.username }}
          TEAM: ${{ inputs.team }}
          NAME: ${{ inputs.name }}
        run: |
          jq -n --arg u "$USERNAME" --arg t "$TEAM" --arg n "$NAME" \
            '{username: $u, name: $n, team: $t}' > global-team-details.json

      - uses: actions/upload-artifact@v7
        with:
          name: global-team-${{ inputs.username }}-${{ inputs.team }}
          path: global-team-details.json
          retention-days: 7
