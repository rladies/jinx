# Reusable: posts a first-time welcome on a new PR or issue.
#
# Caller requirements:
#   - permissions: contents: read, packages: read  (needed to pull
#     ghcr.io/rladies/jinx-bot — without packages: read the docker
#     pull fails with "denied")
#   - secrets: JINX_APP_ID, JINX_PRIVATE_KEY (both available as
#     rladies org-level secrets)
#   - jinx[bot] GitHub App installed on the calling repo
#
# See README.md ("Reusable workflows") for the full caller example.
name: Reusable · Welcome Contributor

on:
  workflow_call:
    secrets:
      JINX_APP_ID:
        required: true
      JINX_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  welcome:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' && github.event.action == 'opened') ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    container:
      image: ghcr.io/rladies/jinx-bot:latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Welcome contributor
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e '
            is_pr <- "${{ github.event_name }}" == "pull_request"
            number <- if (is_pr) {
              ${{ github.event.pull_request.number || 0 }}
            } else {
              ${{ github.event.issue.number || 0 }}
            }
            author <- if (is_pr) {
              "${{ github.event.pull_request.user.login }}"
            } else {
              "${{ github.event.issue.user.login }}"
            }
            jinx::gh_welcome_contributor(
              owner = "${{ github.repository_owner }}",
              repo = "${{ github.event.repository.name }}",
              number = number,
              author = author,
              is_pr = is_pr
            )
          '
