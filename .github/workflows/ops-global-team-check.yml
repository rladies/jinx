name: Ops · Global Team · 02 Check Invitations

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: ops-global-team-check
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Check pending global team invitations
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          Rscript -e '
            accepted <- jinx::gt_check_invitations()
            if (length(accepted) > 0) {
              for (user in accepted) {
                artifacts <- gh::gh(
                  "GET /repos/{repo}/actions/artifacts",
                  repo = Sys.getenv("GH_REPO"),
                  .limit = Inf
                )
                for (art in artifacts$artifacts) {
                  if (grepl(paste0("global-team-", user), art$name) && !art$expired) {
                    tmp <- tempfile(fileext = ".zip")
                    download.file(art$archive_download_url, tmp,
                      headers = c(Authorization = paste("Bearer", Sys.getenv("GH_TOKEN")))
                    )
                    details <- jsonlite::fromJSON(unzip(tmp, exdir = tempdir()))
                    gh::gh(
                      "POST /repos/{repo}/actions/workflows/{workflow_id}/dispatches",
                      repo = Sys.getenv("GH_REPO"),
                      workflow_id = "ops-global-team-finalize.yml",
                      ref = "main",
                      inputs = list(
                        username = details$username,
                        name = details$name,
                        team = details$team
                      )
                    )
                    cli::cli_alert_success("Triggered finalization for {user}")
                  }
                }
              }
            }
          '
