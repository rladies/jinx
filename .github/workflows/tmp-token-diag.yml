name: TMP Token diag

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/tmp-token-diag.yml"

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify CLOUDFLARE_API_TOKEN with Cloudflare directly
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -sS -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | tee /tmp/verify.json
          echo "---"
          echo "Account-level token check (list accounts visible to this token):"
          curl -sS -X GET "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json"
