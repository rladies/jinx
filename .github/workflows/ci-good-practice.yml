name: CI · Good Practice

on:
  pull_request:
    branches: [main]
    paths:
      - "R/**"
      - "tests/**"
      - "man/**"
      - "DESCRIPTION"
      - "NAMESPACE"
      - ".github/scripts/gp-report.R"
      - ".github/workflows/ci-good-practice.yml"

permissions:
  contents: read

jobs:
  gp:
    name: goodpractice check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::goodpractice
            any::rcmdcheck
            local::.

      - name: Run goodpractice
        id: gp
        run: Rscript .github/scripts/gp-report.R

      - name: Post report
        if: always()
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            let report;
            if (fs.existsSync('gp_report.md')) {
              report = fs.readFileSync('gp_report.md', 'utf8');
            } else {
              report = '⚠️ **Good Practice Check**\n\ngoodpractice failed to run — check the workflow logs.';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '**Good Practice Check**';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );
            const body = report + '\n\n*Updated: ' + new Date().toISOString() + '*';
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
