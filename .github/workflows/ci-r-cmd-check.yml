name: CI · R CMD Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'R/**'
      - 'src/**'
      - 'tests/**'
      - 'man/**'
      - 'vignettes/**'
      - 'inst/**'
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - '.Rbuildignore'
  push:
    branches: [main]
    paths:
      - 'R/**'
      - 'src/**'
      - 'tests/**'
      - 'man/**'
      - 'vignettes/**'
      - 'inst/**'
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - '.Rbuildignore'

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
