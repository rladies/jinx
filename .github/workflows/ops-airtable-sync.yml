name: Ops · Airtable Sync

# Directory sync is intentionally NOT run here. jinx is a public repo, and the
# directory carries confidential submission data (e.g. contact emails), so the
# directory sync executes from the PRIVATE rladies/directory repo, which calls
# jinx::directory_sync_airtable(). Only the (public) global-team sync runs here.

on:
  schedule:
    - cron: "0 0 * * FRI"
  workflow_dispatch:

concurrency:
  group: ops-airtable-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Checkout jinx
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: rladies/jinx

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Sync global team from Airtable
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: Rscript -e 'jinx::gt_sync_airtable()'
