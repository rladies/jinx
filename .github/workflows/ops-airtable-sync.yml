name: Ops · Airtable Sync

on:
  schedule:
    - cron: "0 0 * * FRI"
  workflow_dispatch:
    inputs:
      target:
        description: What to sync
        required: true
        type: choice
        options:
          - directory

concurrency:
  group: ops-airtable-sync-${{ inputs.target || 'all' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Checkout jinx
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: rladies/jinx

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Sync from Airtable
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          TARGET: ${{ inputs.target }}
        run: |
          Rscript -e '
            target <- Sys.getenv("TARGET")
            if (target == "" || target == "directory") {
              jinx::directory_sync_airtable()
            }
          '
