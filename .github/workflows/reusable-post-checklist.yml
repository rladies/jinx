name: Reusable · Post Checklist

on:
  workflow_call:
    secrets:
      JINX_APP_ID:
        required: true
      JINX_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  checklist:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rladies/jinx-bot:latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Post content checklist
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e '
            jinx::gh_post_checklist(
              owner = "${{ github.repository_owner }}",
              repo = "${{ github.event.repository.name }}",
              pr_number = ${{ github.event.pull_request.number }}
            )
          '
