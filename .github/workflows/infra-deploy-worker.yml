name: Infra · Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "wrangler.jsonc"
      - ".github/workflows/infra-deploy-worker.yml"
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
      - "wrangler.jsonc"
      - ".github/workflows/infra-deploy-worker.yml"

permissions:
  contents: read

jobs:
  test:
    name: Unit-test worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - run: npm test

  validate:
    name: Validate worker
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate worker bundle
        run: npx --yes wrangler@4 deploy --dry-run --outdir /tmp/worker-dist

  deploy:
    name: Deploy worker
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4 deploy
