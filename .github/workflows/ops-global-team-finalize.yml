name: Ops · Global Team · 03 Finalize

on:
  workflow_dispatch:
    inputs:
      username:
        description: GitHub username
        required: true
      name:
        description: Full name
        required: true
      team:
        description: Team slug
        required: true

concurrency:
  group: ops-global-team-finalize-${{ inputs.username }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Finalize global team onboarding
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          USERNAME: ${{ inputs.username }}
          TEAM: ${{ inputs.team }}
          NAME: ${{ inputs.name }}
        run: |
          Rscript -e '
            jinx::gt_finalize_onboarding(
              username = Sys.getenv("USERNAME"),
              team     = Sys.getenv("TEAM"),
              name     = Sys.getenv("NAME")
            )
          '
