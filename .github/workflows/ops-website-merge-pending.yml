name: Ops · Website · Auto Merge Pending

on:
  schedule:
    - cron: "58 10 * * *"
  workflow_dispatch:

concurrency:
  group: ops-website-merge-pending
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Checkout jinx
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: rladies/jinx

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Auto-merge pending PRs
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e 'jinx::website_merge_pending()'
