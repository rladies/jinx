name: Ops · Contributors Update

on:
  schedule:
    - cron: "0 10 1 * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to update (leave empty for all key repos)"
        required: false

concurrency:
  group: ops-update-contributors-${{ inputs.repo || 'all' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Checkout jinx
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          repository: rladies/jinx

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Update contributors list
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.repo }}
        run: |
          Rscript -e '
            repo <- Sys.getenv("REPO")
            if (nzchar(repo)) {
              jinx::contributor_update("rladies", repo)
            } else {
              repos <- c("rladies.github.io", "directory",
                         "awesome-rladies-creations", "meetup_archive",
                         "rladiesguide", "jinx")
              for (r in repos) {
                tryCatch(
                  jinx::contributor_update("rladies", r),
                  error = function(e) {
                    cli::cli_alert_warning("Failed for {r}: {e$message}")
                  }
                )
              }
            }
          '
