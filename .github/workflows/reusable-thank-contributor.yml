# Reusable: posts a thank-you on a merged PR (different message for
# first-time vs returning contributors).
#
# Caller requirements:
#   - permissions: contents: read, packages: read  (needed to pull
#     ghcr.io/rladies/jinx-bot — without packages: read the docker
#     pull fails with "denied")
#   - secrets: JINX_APP_ID, JINX_PRIVATE_KEY (both available as
#     rladies org-level secrets)
#   - jinx[bot] GitHub App installed on the calling repo
#
# See README.md ("Reusable workflows") for the full caller example.
name: Reusable · Thank Contributor

on:
  workflow_call:
    secrets:
      JINX_APP_ID:
        required: true
      JINX_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  thank:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    container:
      image: ghcr.io/rladies/jinx-bot:latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Thank contributor
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e '
            jinx::gh_thank_contributor(
              owner = "${{ github.repository_owner }}",
              repo = "${{ github.event.repository.name }}",
              pr_number = ${{ github.event.pull_request.number }},
              author = "${{ github.event.pull_request.user.login }}"
            )
          '
