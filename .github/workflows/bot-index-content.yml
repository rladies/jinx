name: Bot · Index Content

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 0"

permissions:
  contents: read

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: ghcr.io/rladies/jinx-bot:latest
    steps:
      - name: Checkout jinx
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Mint jinx-familiar App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Build RAG index
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VECTORIZE_INDEX: rladies-content
          JINX_PATH: ${{ github.workspace }}
        run: Rscript -e 'jinx::rag_index_build()'
