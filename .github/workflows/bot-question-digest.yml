name: Bot · Question Digest

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

concurrency:
  group: bot-question-digest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/rladies/jinx-bot:latest

    steps:
      - name: Post weekly question-gap digest
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SLACK_TOKEN: ${{ secrets.SLACK_ORGANISER_TOKEN }}
        run: Rscript -e 'jinx::question_digest_post(days = 7)'
