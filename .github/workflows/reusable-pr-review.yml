# Reusable: calls jinx::review_run() to label and assign reviewers
# based on the rules bundled in jinx (inst/config/review-rules.yml).
#
# Caller requirements:
#   - permissions: contents: read, packages: read  (needed to pull
#     ghcr.io/rladies/jinx-bot — without packages: read the docker
#     pull fails with "denied")
#   - secrets: JINX_APP_ID, JINX_PRIVATE_KEY (both available as
#     rladies org-level secrets)
#   - jinx[bot] GitHub App installed on the calling repo
#
# See README.md ("Reusable workflows") for the full caller example.
name: Reusable · PR Review

on:
  workflow_call:
    secrets:
      JINX_APP_ID:
        required: true
      JINX_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false
    container:
      image: ghcr.io/rladies/jinx-bot:latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Run PR review automation
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e '
            jinx::review_run(
              owner = "${{ github.repository_owner }}",
              repo = "${{ github.event.repository.name }}",
              pr_number = ${{ github.event.pull_request.number }}
            )
          '
