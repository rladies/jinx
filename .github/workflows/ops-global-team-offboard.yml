name: Ops · Global Team · Offboard Start

on:
  workflow_dispatch:
    inputs:
      team:
        type: choice
        description: Team
        required: true
        options:
          - abstract-review
          - blog
          - campaigns
          - chapter-activity
          - chapter-onboarding
          - coc
          - communications
          - community-slack
          - conference-liaison
          - directory
          - meetup-pro
          - mentoring
          - rocur
          - translation
          - website
      name:
        description: Full name
        required: true
      username:
        description: GitHub username (without @)
        required: true

concurrency:
  group: ops-global-team-offboard-${{ inputs.username }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  offboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Create offboarding issue
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          USERNAME: ${{ inputs.username }}
          TEAM: ${{ inputs.team }}
          NAME: ${{ inputs.name }}
        run: |
          Rscript -e '
            jinx::gt_create_offboarding(
              username = Sys.getenv("USERNAME"),
              team     = Sys.getenv("TEAM"),
              name     = Sys.getenv("NAME")
            )
          '
