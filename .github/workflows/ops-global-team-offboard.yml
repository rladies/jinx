name: Ops · Global Team · Offboard Start

on:
  workflow_dispatch:
    inputs:
      team:
        type: choice
        description: Team
        required: true
        options:
          - abstract-review
          - blog
          - campaigns
          - chapter-activity
          - chapter-onboarding
          - coc
          - communications
          - community-slack
          - conference-liaison
          - directory
          - meetup-pro
          - mentoring
          - rocur
          - translation
          - website
      name:
        description: Full name
        required: true
      username:
        description: GitHub username (without @)
        required: true

jobs:
  offboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Create offboarding issue
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          Rscript -e '
            jinx::global_team_create_offboarding(
              username = "${{ inputs.username }}",
              team = "${{ inputs.team }}",
              name = "${{ inputs.name }}"
            )
          '
